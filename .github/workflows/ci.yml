name: CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y multipart || true
          pip install --force-reinstall "python-multipart==0.0.20"

      - name: Build Docker image
        run: docker build -t mlops-app .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y multipart || true
          pip install --force-reinstall "python-multipart==0.0.20"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest

  deploy:
  runs-on: ubuntu-latest
  needs: test
  if: github.ref == 'refs/heads/main'

  steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Deploy to Hugging Face Space
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "github-actions"
        git remote remove space || true
        git remote add space https://user:${HF_TOKEN}@huggingface.co/spaces/userANNA123/monitoring-api
        git push --force space HEAD:main